name: Deploy to GitHub Pages

# 推送到 main 时自动构建,并把 dist/ 发布到 gh-pages 分支（Pages 从该分支提供服务）。
# 用 peaceiris/actions-gh-pages：纯 git push，绕开 deploy-pages 环境/分支策略，最稳妥。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (类型检查 + 打包到 dist/)
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
